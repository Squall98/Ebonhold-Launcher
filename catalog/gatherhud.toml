description = "HUD de récolte en vue 3D : les gisements affichés autour de toi."
long_description = "GatherHud affiche les nœuds de minage et d'herboristerie en perspective 3D tout autour de ton personnage, comme posés dans le monde devant toi. Idéal pour farmer en suivant ta route sans quitter l'écran des yeux. Affiche aussi ta route Routes dans le HUD. Cette version Ebonhold ajoute une icône sur la minicarte (clic gauche = options, clic droit = activer/désactiver) et complète la traduction française. Nécessite GatherMate (et GatherMate_Data pour les gisements pré-remplis) ; Routes est optionnel. WoW 3.3.5a."
